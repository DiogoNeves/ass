<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASS - Argumentative System Service</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --surface2: #0f3460;
            --text: #e6e6e6;
            --text-dim: #8888aa;
            --accent: #e94560;
            --green: #00c853;
            --red: #ff5252;
            --blue: #448aff;
            --yellow: #ffd740;
            --border: #2a2a4a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 2rem 1rem 1rem;
            border-bottom: 1px solid var(--border);
        }
        .header h1 { font-size: 1.8rem; letter-spacing: 0.1em; }
        .header p { color: var(--text-dim); margin-top: 0.3rem; }

        .controls {
            max-width: 800px;
            margin: 1.5rem auto;
            padding: 0 1rem;
        }
        .input-row {
            display: flex;
            gap: 0.5rem;
        }
        .input-row input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text);
            font-size: 1rem;
            outline: none;
        }
        .input-row input:focus { border-color: var(--accent); }
        .input-row button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .input-row button:hover { opacity: 0.9; }
        .input-row button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .settings {
            display: flex;
            gap: 1.5rem;
            margin-top: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .settings label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-dim);
            font-size: 0.85rem;
            cursor: pointer;
        }
        .settings input[type="checkbox"] { accent-color: var(--accent); }
        .settings input[type="number"] {
            width: 60px;
            padding: 0.3rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--surface);
            color: var(--text);
            font-size: 0.85rem;
        }

        .debate-area {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1rem 3rem;
        }

        .status-bar {
            text-align: center;
            padding: 0.75rem;
            color: var(--text-dim);
            font-style: italic;
        }
        .status-bar.active { color: var(--accent); }
        .spinner::after {
            content: '';
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--text-dim);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 0.5rem;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .iteration-header {
            text-align: center;
            margin: 1.5rem 0 1rem;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text);
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }

        .response-card {
            border-left: 4px solid;
            background: var(--surface);
            border-radius: 0 8px 8px 0;
            padding: 1rem 1.25rem;
            margin: 0.75rem 0;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }
        .response-card.green { border-left-color: var(--green); }
        .response-card.red { border-left-color: var(--red); }
        .response-card.blue { border-left-color: var(--blue); }
        .response-card.yellow { border-left-color: var(--yellow); }
        .response-card .name {
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .response-card.green .name { color: var(--green); }
        .response-card.red .name { color: var(--red); }
        .response-card.blue .name { color: var(--blue); }
        .response-card.yellow .name { color: var(--yellow); }
        .response-card .text {
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .vote-section {
            background: var(--surface);
            border-radius: 8px;
            padding: 1.25rem;
            margin: 1rem 0;
            border: 1px solid var(--border);
        }
        .vote-section h3 {
            margin-bottom: 0.75rem;
            font-size: 1rem;
        }
        .vote-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }
        .vote-table th, .vote-table td {
            padding: 0.5rem 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .vote-table th { color: var(--text-dim); font-size: 0.85rem; }

        .individual-votes { font-size: 0.9rem; }
        .individual-votes .voter { font-weight: 600; margin-top: 0.5rem; }
        .individual-votes .rankings { color: var(--text-dim); margin-left: 1rem; }
        .individual-votes .reasoning {
            color: var(--text-dim);
            font-style: italic;
            margin-left: 1rem;
            margin-bottom: 0.3rem;
        }

        .consensus-banner {
            text-align: center;
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 700;
            margin: 0.5rem 0;
        }
        .consensus-banner.reached {
            background: rgba(0, 200, 83, 0.15);
            color: var(--green);
            border: 1px solid var(--green);
        }
        .consensus-banner.not-reached {
            color: var(--yellow);
        }

        .judge-card {
            background: var(--surface2);
            border: 2px solid var(--text-dim);
            border-radius: 8px;
            padding: 1.25rem;
            margin: 1.5rem 0;
        }
        .judge-card .name {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.75rem;
        }
        .judge-card .text {
            line-height: 1.6;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ASS</h1>
        <p>Argumentative System Service</p>
    </div>

    <div class="controls">
        <div class="input-row">
            <input type="text" id="question" placeholder="What question would you like them to debate?"
                   autofocus>
            <button id="startBtn" onclick="startDebate()">Start Debate</button>
        </div>
        <div class="settings">
            <label>
                <input type="checkbox" id="classicMode"> Classic Mode (3 rounds, no voting)
            </label>
            <label>
                Max iterations:
                <input type="number" id="maxIterations" value="10" min="1" max="50">
            </label>
            <label>
                Threshold:
                <input type="number" id="threshold" value="0.75" min="0" max="1" step="0.05">
            </label>
        </div>
    </div>

    <div class="debate-area" id="debateArea">
        <div class="status-bar" id="statusBar"></div>
    </div>

    <script>
        const debateArea = document.getElementById('debateArea');
        let statusBar = document.getElementById('statusBar');
        const startBtn = document.getElementById('startBtn');
        const questionInput = document.getElementById('question');

        questionInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !startBtn.disabled) startDebate();
        });

        function setStatus(msg, active = true) {
            statusBar.textContent = msg;
            statusBar.className = 'status-bar' + (active ? ' active spinner' : '');
        }

        function clearStatus() {
            statusBar.textContent = '';
            statusBar.className = 'status-bar';
        }

        function addElement(html) {
            const div = document.createElement('div');
            div.innerHTML = html;
            debateArea.insertBefore(div.firstElementChild, statusBar);
            statusBar.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        async function startDebate() {
            const question = questionInput.value.trim();
            if (!question) return;

            // Clear previous debate and re-acquire statusBar reference
            debateArea.innerHTML = '<div class="status-bar" id="statusBar"></div>';
            statusBar = document.getElementById('statusBar');

            startBtn.disabled = true;
            setStatus('Starting debate...');

            const params = new URLSearchParams({
                question,
                classic_mode: document.getElementById('classicMode').checked,
                max_iterations: document.getElementById('maxIterations').value,
                consensus_threshold: document.getElementById('threshold').value,
            });

            try {
                const res = await fetch('/api/debate/start?' + params);
                const { debate_id } = await res.json();

                const evtSource = new EventSource('/api/debate/' + debate_id + '/stream');
                evtSource.onmessage = (e) => {
                    const event = JSON.parse(e.data);
                    handleEvent(event, evtSource);
                };
                evtSource.onerror = () => {
                    evtSource.close();
                    setStatus('Connection lost.', false);
                    startBtn.disabled = false;
                };
            } catch (err) {
                setStatus('Failed to start debate: ' + err.message, false);
                startBtn.disabled = false;
            }
        }

        function handleEvent(event, evtSource) {
            switch (event.type) {
                case 'debate_start':
                    addElement(`<div class="iteration-header">Debate: ${escapeHtml(event.question)}</div>`);
                    break;

                case 'iteration_start':
                    addElement(`<div class="iteration-header">${escapeHtml(event.label)}</div>`);
                    break;

                case 'belief_forming':
                    setStatus(`${event.personality} is forming internal beliefs...`);
                    break;

                case 'belief_updating':
                    setStatus(`${event.personality} is evaluating arguments...`);
                    break;

                case 'thinking':
                    setStatus(`${event.personality} is ${event.action || 'thinking'}...`);
                    break;

                case 'response':
                    clearStatus();
                    addElement(`
                        <div class="response-card ${event.style}">
                            <div class="name">${escapeHtml(event.personality)}</div>
                            <div class="text">${escapeHtml(event.text)}</div>
                        </div>
                    `);
                    break;

                case 'voting_start':
                    addElement(`<div class="iteration-header">Voting Phase</div>`);
                    break;

                case 'voting_personality':
                    setStatus(`${event.personality} is voting...`);
                    break;

                case 'vote_results':
                    clearStatus();
                    renderVoteResults(event);
                    break;

                case 'consensus':
                    addElement(`<div class="consensus-banner reached">Consensus Reached! Winner: ${escapeHtml(event.winner)}</div>`);
                    break;

                case 'next_iteration':
                    setStatus(`Starting iteration ${event.next_iteration + 1}/${event.max_iterations}...`);
                    break;

                case 'judge_thinking':
                    setStatus('The Judge is reviewing the entire debate...');
                    break;

                case 'judge_decision':
                    clearStatus();
                    addElement(`
                        <div class="judge-card">
                            <div class="name">Final Decision</div>
                            <div class="text">${escapeHtml(event.text)}</div>
                        </div>
                    `);
                    break;

                case 'error':
                    clearStatus();
                    addElement(`<div class="consensus-banner" style="color:var(--red);border:1px solid var(--red)">Error: ${escapeHtml(event.message)}</div>`);
                    break;

                case 'done':
                    evtSource.close();
                    setStatus('Debate complete.', false);
                    startBtn.disabled = false;
                    break;

                default:
                    // Silently ignore unknown events (belief_formed, belief_updated, etc.)
                    break;
            }
        }

        function renderVoteResults(event) {
            const summary = event.summary || {};
            const maxPts = event.max_possible_points || 16;
            const rankings = summary.sorted_rankings || [];
            const individual = summary.individual_votes || [];

            let tableRows = rankings.map(([name, score]) => {
                const pct = ((score / maxPts) * 100).toFixed(1);
                return `<tr><td>${escapeHtml(name)}</td><td>${score}</td><td>${pct}%</td></tr>`;
            }).join('');

            let individualHtml = individual.map(v => `
                <div class="voter">${escapeHtml(v.voter)}</div>
                <div class="rankings">${v.rankings.map(escapeHtml).join(' → ')}</div>
                ${v.reasoning ? `<div class="reasoning">${escapeHtml(v.reasoning)}</div>` : ''}
            `).join('');

            let consensusHtml = '';
            if (!event.consensus_reached) {
                const needed = summary.threshold_score || 0;
                consensusHtml = `<div class="consensus-banner not-reached">No consensus yet. Need ${Math.round(needed)} points (${(event.threshold * 100).toFixed(0)}% of max)</div>`;
            }

            addElement(`
                <div class="vote-section">
                    <h3>Voting Results - Iteration ${event.iteration + 1}</h3>
                    <table class="vote-table">
                        <thead><tr><th>Participant</th><th>Score</th><th>Percentage</th></tr></thead>
                        <tbody>${tableRows}</tbody>
                    </table>
                    <div class="individual-votes">${individualHtml}</div>
                    ${consensusHtml}
                </div>
            `);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
